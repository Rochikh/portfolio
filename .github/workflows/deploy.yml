name: Deploy with Secret Injection
on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Inject API Key
        env:
          API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          sed -i "s|{{GEMINI_API_KEY}}|${API_KEY}|g" index.html

      - name: Verify Injection (Debug)
        run: |
          if grep -q "{{GEMINI_API_KEY}}" index.html; then
            echo "ERREUR : Le marqueur est toujours présent dans le fichier !"
            exit 1
          else
            echo "SUCCÈS : Le marqueur a bien été remplacé."
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
